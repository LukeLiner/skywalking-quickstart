# Data Prepper Pipeline Configuration
# OTLP Traces and Logs enabled

# ============== OTel Logs Pipeline ==============
# 接收来自 OTel Collector 的日志数据
otel-logs-pipeline:
  source:
    otel_logs_source:
      port: 21892
      ssl: false
  buffer:
    bounded_blocking:
      buffer_size: 10240
      batch_size: 1024
  sink:
    - opensearch:
        hosts:
          - "http://opensearch:9200"
        index_type: custom
        index: "logs-otel-%{yyyy.MM.dd}"
        bulk_size: 50
        flush_timeout: 10
        dlq_file: "/usr/share/data-prepper/data/prepper-writer-dlq.log"


