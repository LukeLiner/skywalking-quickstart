# Data Prepper Pipeline Configuration
# OTLP Traces + Metrics + Logs to OpenSearch

# ============== OTel Logs Pipeline ==============
otel-logs-pipeline:
  source:
    otel_logs_source:
      port: 21892
      ssl: false
  buffer:
    bounded_blocking:
      buffer_size: 10240
      batch_size: 1024
  sink:
    - opensearch:
        hosts:
          - "http://opensearch:9200"
        index_type: custom
        index: "logs-otel-%{yyyy.MM.dd}"
        bulk_size: 50
        flush_timeout: 10
        dlq_file: "/usr/share/data-prepper/data/prepper-writer-dlq.log"


# ============== Metrics Pipeline (from OTel Collector) ==============
otel-metrics-pipeline:
  source:
    otel_metrics_source:
      port: 21891
      ssl: false
  buffer:
    bounded_blocking:
      buffer_size: 5120
      batch_size: 512
  processor:
    - otel_metrics_raw_processor:
  sink:
    - opensearch:
        hosts:
          - "http://opensearch:9200"
        index_type: custom
        index: "metrics-otel-%{yyyy.MM.dd}"
        bulk_size: 20
        flush_timeout: 30

# ============== OTel Trace Pipeline ==============
# Entry pipeline: receive OTLP traces
otel-trace-pipeline:
  source:
    otel_trace_source:
      port: 21890
      ssl: false
  buffer:
    bounded_blocking:
      buffer_size: 51200
      batch_size: 800
  sink:
    - pipeline:
        name: "raw-trace-pipeline"
    - pipeline:
        name: "service-map-pipeline"

# Raw trace processing pipeline
raw-trace-pipeline:
  source:
    pipeline:
      name: "otel-trace-pipeline"
  buffer:
    bounded_blocking:
      buffer_size: 51200
      batch_size: 800
  processor:
    - otel_trace_raw:
  sink:
    - opensearch:
        hosts:
          - "http://opensearch:9200"
        index_type: custom
        index: "otel-v1-apm-span-%{yyyy.MM.dd}"
        bulk_size: 20
        flush_timeout: 30
        document_id_field: "traceId"
        dlq_file: "/usr/share/data-prepper/data/prepper-writer-dlq.log"

# Service map pipeline
service-map-pipeline:
  source:
    pipeline:
      name: "otel-trace-pipeline"
  buffer:
    bounded_blocking:
      buffer_size: 51200
      batch_size: 800
  processor:
    - service_map_stateful:
        window_duration: 180
  sink:
    - opensearch:
        hosts:
          - "http://opensearch:9200"
        index_type: trace-analytics-service-map
        bulk_size: 20
        flush_timeout: 30
