otlp-pipeline:
  workers: 5
  delay: 10
  source:
    otlp:
      ssl: false
      port: 21890
  router:
    - "LOG": '/eventType == "LOG"'
    - "TRACE": '/eventType == "TRACE"'
  route:
    - LOG: [otel-logs-pipeline]
    - TRACE: [otel-traces-pipeline]


otel-logs-pipeline:
workers: 5
delay: 10
source:
  pipeline:
    name: "otlp-pipeline"
processor:
  - copy_values:
      entries:
        - from_key: "time"
          to_key: "@timestamp"
sink:
  - opensearch:
      hosts: ["https://opensearch:9200"]
      username: "admin"
      password: "${OPENSEARCH_PASSWORD}"
      insecure: true
      index_type: log-analytics-plain

otel-traces-pipeline:
  source:
    pipeline:
      name: "otlp-pipeline"
  sink:
    - pipeline:
        name: "traces-raw-pipeline"
    - pipeline:
        name: "service-map-pipeline"


traces-raw-pipeline:
  source:
    pipeline:
      name: "otel-traces-pipeline"
  processor:
    - otel_traces:
  sink:
    - opensearch:
        hosts: ["https://opensearch:9200"]
        username: "admin"
        password: "${OPENSEARCH_PASSWORD}"
        insecure: true
        index_type: trace-analytics-plain-raw


service-map-pipeline:
  source:
    pipeline:
      name: "otel-traces-pipeline"
  processor:
    - otel_apm_service_map:
        group_by_attributes:
          - telemetry.sdk.language
        window_duration: "10s"
  route:
    - SERVICE_MAP: [opensearch-service-map-sink]
    - METRIC: [prometheus-service-map-sink]
  sink:
    - opensearch:
        name: opensearch-service-map-sink
        hosts: ["https://opensearch:9200"]
        username: "admin"
        password: "${OPENSEARCH_PASSWORD}"
        insecure: true
        index_type: otel-v2-apm-service-map
    - prometheus_remote_write:
        name: prometheus-service-map-sink
        url: "http://prometheus:9090/api/v1/write"
        max_events: 500
        flush_timeout: "5s"

ssl: false
experimental:
  enabled_plugins:
    processor:
      - otel_apm_service_map
    sink:
      - prometheus