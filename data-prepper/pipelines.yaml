version: "2"

# ==================== 入口 Pipeline ====================
entry-pipeline:
  source:
    otlp:
      port: 21890
      ssl: false
  route:
    - logs: 'getEventType() == "LOG"'
    - traces: 'getEventType() == "TRACE"'
    - metrics: 'getEventType() == "METRIC"'
  sink:
    # 日志路由
    - pipeline:
        name: "logs-pipeline"
        routes: ["logs"]
    # 指标路由
    - pipeline:
        name: "metrics-pipeline"
        routes: ["metrics"]
    # Trace 路由到原始存储 Pipeline
    - pipeline:
        name: "traces-raw-pipeline"
        routes: ["traces"]
    # Trace 路由到 Service Map Pipeline（新增）
    - pipeline:
        name: "service-map-pipeline"
        routes: ["traces"]

# ==================== 日志 Pipeline ====================
logs-pipeline:
  source:
    pipeline:
      name: "entry-pipeline"
  processor:
    - add_entries:
        entries:
          - key: "pipeline_type"
            value: "logs"
  sink:
    - opensearch:
        hosts: ["http://opensearch:9200"]
        username: "admin"
        # password: "${OPENSEARCH_PASSWORD}"
        index: "otel-logs-%{yyyy.MM.dd}"
        insecure: true

# ==================== 指标 Pipeline ====================
metrics-pipeline:
  source:
    pipeline:
      name: "entry-pipeline"
  processor:
    - otel_metrics:
  sink:
    - opensearch:
        hosts: ["http://opensearch:9200"]
        username: "admin"
        # password: "${OPENSEARCH_PASSWORD}"
        index: "metrics-otel-%{yyyy.MM.dd}"
        insecure: true

# ==================== Trace 原始数据 Pipeline ====================
traces-raw-pipeline:
  source:
    pipeline:
      name: "entry-pipeline"
  processor:
    - otel_traces:          # 处理 Trace 数据，生成标准 span 格式
  sink:
    - opensearch:
        hosts: ["http://opensearch:9200"]
        username: "admin"
        # password: "${OPENSEARCH_PASSWORD}"
        index_type: trace-analytics-raw      # 自动写入 otel-v1-apm-span-* 索引
        insecure: true

# ==================== Service Map Pipeline（新增）====================
service-map-pipeline:
  delay: "100"               # 可选，数据处理延迟（毫秒）
  source:
    pipeline:
      name: "entry-pipeline"
  processor:
    - service_map:
        # window_duration: 180    # 关系计算窗口（秒），默认 3 分钟
        # 其他可选参数：
        # eager_metadata_refresh: false
  sink:
    - opensearch:
        hosts: ["http://opensearch:9200"]
        username: "admin"
        # password: "${OPENSEARCH_PASSWORD}"
        index_type: trace-analytics-service-map   # 自动创建 otel-v1-apm-service-map-* 索引
        insecure: true