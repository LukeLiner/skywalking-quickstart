# pipelines.yaml
version: "2"

# 主入口 pipeline - 接收 OTLP 数据并按类型路由
entry-pipeline:
  source:
    otlp:
      port: 21890
      # 注意：Collector 中配置的 endpoint: data-prepper:21890 对应这里的端口
      # 如果 Data Prepper 使用默认配置，端口为 21890
      ssl: false                    # 若需要 TLS，改为 true 并配置证书
      # request_timeout: 10000      # 可选，请求超时时间
  route:
    - logs: 'getEventType() == "LOG"'
    - traces: 'getEventType() == "TRACE"'
    - metrics: 'getEventType() == "METRIC"'
  sink:
    - pipeline:
        name: "logs-pipeline"
        routes: ["logs"]
    - pipeline:
        name: "traces-pipeline"
        routes: ["traces"]
    - pipeline:
        name: "metrics-pipeline"
        routes: ["metrics"]

# 日志处理 pipeline
logs-pipeline:
  source:
    pipeline:
      name: "entry-pipeline"
  processor:
    # 可选：添加自定义字段
    - add_entries:
        entries:
          - key: "pipeline_type"
            value: "logs"
    # 可选：重命名字段
    # - rename_keys:
    #     entries:
    #       - from_key: "body"
    #         to_key: "message"
  sink:
    - opensearch:
        hosts: ["http://opensearch:9200"]     # OpenSearch 地址
        username: "admin"                       # 用户名
        # password: "${OPENSEARCH_PASSWORD}"      # 密码，建议用环境变量
        index: "otel-logs-%{yyyy.MM.dd}"        # 按日期分索引
        # 若需 trace analytics 功能，可使用 index_type: trace-analytics-raw
        # index_type: trace-analytics-raw
        insecure: true                          # 若 OpenSearch 使用自签名证书，设为 true

# 追踪处理 pipeline（如需）
traces-pipeline:
  source:
    pipeline:
      name: "entry-pipeline"
  processor:
    - otel_traces:                # 专门处理追踪数据的处理器
  sink:
    - opensearch:
        hosts: ["http://opensearch:9200"]
        username: "admin"
        # password: "${OPENSEARCH_PASSWORD}"
        index_type: trace-analytics-raw        # 使用预定义的 trace 索引模板

# 指标处理 pipeline（如需）
metrics-pipeline:
  source:
    pipeline:
      name: "entry-pipeline"
  processor:
    - otel_metrics:              # 专门处理指标数据的处理器
  sink:
    - opensearch:
        hosts: ["http://opensearch:9200"]
        username: "admin"
        # password: "${OPENSEARCH_PASSWORD}"
        index: "metrics-otel-%{yyyy.MM.dd}"