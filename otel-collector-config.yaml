receivers:
  # 接收 SkyWalking Agent 数据
  skywalking:
    protocols:
      grpc:
        endpoint: 0.0.0.0:11800
      http:
        endpoint: 0.0.0.0:12800

  # 接收 SkyWalking OAP exporter 发送的 OTLP 数据
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Prometheus receiver (scrape metrics)
  prometheus:
    config:
      scrape_configs:
        - job_name: 'otel-collector'
          scrape_interval: 30s
          static_configs:
            - targets: ['localhost:8888']
        
        - job_name: 'xiaozhou-order'
          scrape_interval: 30s
          static_configs:
            - targets: ['xiaozhou-order:8089']
          metrics_path: '/actuator/prometheus'
        
        - job_name: 'xiaozhou-product'
          scrape_interval: 30s
          static_configs:
            - targets: ['xiaozhou-product:8090']
          metrics_path: '/actuator/prometheus'
        
        - job_name: 'cadvisor'
          scrape_interval: 30s
          static_configs:
            - targets: ['cadvisor:8080']

  # File log receiver - collect logs from application log files
  # File log receiver
  filelog:
    include:
      - /var/log/apps/xiaozhou-order/*.log
      - /var/log/apps/xiaozhou-product/*.log
      - /var/log/apps/xiaozhou-stock/*.log
    start_at: end
    operators:
      - type: json_parser
        timestamp:
          parse_from: attributes["@timestamp"]
          layout: '%Y-%m-%dT%H:%M:%S.%LZ'
      - type: regex_parser
        regex: '/var/log/apps/(?P<service_name>[^/]+)/'
        parse_from: attributes["log.file.path"]
      - type: move
        from: attributes.service_name
        to: resource["service.name"]
      - type: move
        from: attributes.level
        to: attributes["log.level"]
      - type: move
        from: attributes.thread_name
        to: attributes["thread.name"]
      - type: move
        from: attributes.logger_name
        to: attributes["logger.name"]

# Processors
processors:
  batch:
    timeout: 10s
    send_batch_size: 1024
  
  resourcedetection:
    detectors: [env, system]
    timeout: 5s

  resource:
    attributes:
      - key: deployment.environment
        value: "production"
        action: insert

  # Transform logs to add trace context
  transform:
    trace_statements:
        - context: resource
          statements:
            - set(resource.attributes["service.name"], "unknown") where resource.attributes["service.name"] == nil

  # OTLP processor to ensure proper OTLP format for traces
  transform/traces:
    error_mode: ignore
    trace_statements:
      - context: resource
        statements:
          - keep_keys(resource.attributes, ["service.name", "service.namespace", "service.instance.id", "service.version", "deployment.environment"])
          - set(resource.attributes["telemetry.sdk.name"], "opentelemetry")
          - set(resource.attributes["telemetry.sdk.language"], "java")
# Exporters
exporters:
  # OTLP exporter to Data Prepper (for metrics)
  otlp/dataprepper-metrics:
    endpoint: data-prepper:21891
    tls:
      insecure: true
  
  # OTLP exporter to Data Prepper (for traces from OAP)
  otlp/dataprepper-traces:
    endpoint: data-prepper:21890
    tls:
      insecure: true

  # Log exporter to OpenSearch (using elasticsearch protocol)
  opensearch/logs:
    logs_index: logs-otel-%{!timestamp:yyyy.MM.dd}
    http:
      endpoint: http://opensearch:9200
      timeout: 30s
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

# Service pipelines
service:
  pipelines:
    # Metrics pipeline
    metrics:
      receivers: [prometheus]
      processors: [resource]
      exporters: [otlp/dataprepper-metrics]
    
    # Traces pipeline - receives OTLP traces from external clients
    traces:
      receivers: [skywalking, otlp]
      processors: [resource, transform/traces, batch]
      exporters: [otlp/dataprepper-traces]

    # Logs pipeline - collect application logs
    logs:
      receivers: [filelog]
      processors: [resource, transform]
      exporters: [opensearch/logs]
  
  telemetry:
    logs:
      level: info