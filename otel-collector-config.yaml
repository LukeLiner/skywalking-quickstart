receivers:
  # OTLP receiver (如果应用直接发送 OTLP 数据)
  # otlp:
  #   protocols:
  #     grpc:
  #       endpoint: 0.0.0.0:4317
  #     http:
  #       endpoint: 0.0.0.0:4318

  # SkyWalking receiver (用于接收 SkyWalking 格式的追踪数据)
  skywalking:
    protocols:
      grpc:
        endpoint: 0.0.0.0:11800

  # Filelog receiver (读取应用日志文件)
  filelog:
    include:
      - /var/log/apps/xiaozhou-order/*.log
      - /var/log/apps/xiaozhou-product/*.log
    start_at: end
    operators:
      - type: json_parser
        timestamp:
          parse_from: attributes["@timestamp"]
          layout: '%Y-%m-%dT%H:%M:%S.%LZ'
      - type: regex_parser
        regex: '/var/log/apps/(?P<service_name>[^/]+)/'
        parse_from: attributes["log.file.path"]
      - type: move
        from: attributes.service_name
        to: resource["service.name"]
      - type: move
        from: attributes.level
        to: attributes["log.level"]
      - type: move
        from: attributes.thread_name
        to: attributes["thread.name"]
      - type: move
        from: attributes.logger_name
        to: attributes["logger.name"]

  # Prometheus receiver (采集指标)
  prometheus:
    config:
      scrape_configs:
        - job_name: 'otel-collector'
          scrape_interval: 30s
          static_configs:
            - targets: ['localhost:8888']
        - job_name: 'xiaozhou-order'
          scrape_interval: 30s
          static_configs:
            - targets: ['xiaozhou-order:8089']
          metrics_path: '/actuator/prometheus'
        - job_name: 'xiaozhou-product'
          scrape_interval: 30s
          static_configs:
            - targets: ['xiaozhou-product:8090']
          metrics_path: '/actuator/prometheus'
        - job_name: 'cadvisor'
          scrape_interval: 30s
          static_configs:
            - targets: ['cadvisor:8080']

processors:

  batch:
    timeout: 10s
    send_batch_size: 1024

  resource:
    attributes:
      - key: deployment.environment
        value: "production"
        action: insert

  resourcedetection:
    detectors: [env, system]
    timeout: 5s

exporters:
  # 统一 OTLP exporter，将所有信号发送到 Data Prepper 的统一入口
  otlp:
    endpoint: data-prepper:21890   # Data Prepper 统一 OTLP 端口
    tls:
      insecure: true
    timeout: 30s
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s

  # Prometheus exporter (可选，用于暴露 Collector 自身的指标)
  prometheus:
    endpoint: "0.0.0.0:8889"

  # Debug exporter (调试用)
  debug:
    verbosity: detailed
    sampling_initial: 5
    sampling_thereafter: 200

service:
  pipelines:
    logs:
      receivers: [filelog]
      processors: [resourcedetection, resource, batch]   # 调整顺序，先检测资源
      exporters: [otlp, debug]                           # 发送到统一 OTLP 端点

    metrics:
      receivers: [prometheus]
      processors: [batch, resource]
      exporters: [otlp, prometheus]                      # 同时发送到 Data Prepper 和本地 Prometheus

    traces:
      receivers: [skywalking]                            # 注意：SkyWalking 格式可能需要转换
      processors: [batch, resource]
      exporters: [otlp]                                  # 发送到统一 OTLP 端点

  telemetry:
    logs:
      level: info