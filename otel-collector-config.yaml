receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        include_metadata: true

  # Prometheus receiver - 采集 Prometheus 格式的指标
  # 官方文档: https://github.com/open-telemetry/opentelemetry-collector-contrib/tree/main/receiver/prometheusreceiver
  prometheus:
    # 可选：修剪指标名称中的单位/后缀（实验性功能）
    trim_metric_suffixes: false
    
    # Prometheus 抓取配置（完整支持 Prometheus scrape_config 语法）
    config:
      global:
        scrape_interval: 30s
        scrape_timeout: 10s
        scrape_native_histograms: false
        scrape_protocols:
          - PrometheusProto
          - OpenMetricsText1.0.0
          - OpenMetricsText0.0.1
          - PrometheusText0.0.4
      
      scrape_configs:
        # 1. OTel Collector 自身指标
        - job_name: 'otel-collector'
          scrape_interval: 30s
          static_configs:
            - targets: ['localhost:8888']
        
        # 2. Spring Boot 应用 - xiaozhou-order
        - job_name: 'xiaozhou-order'
          scrape_interval: 30s
          metrics_path: '/actuator/prometheus'
          static_configs:
            - targets: ['xiaozhou-order:8089']
          # 可选：指标重标签配置（示例：只保留 JVM 相关指标）
          # metric_relabel_configs:
          #   - source_labels: [__name__]
          #     regex: "jvm_.*"
          #     action: keep
        
        # 3. Spring Boot 应用 - xiaozhou-product
        - job_name: 'xiaozhou-product'
          scrape_interval: 30s
          metrics_path: '/actuator/prometheus'
          static_configs:
            - targets: ['xiaozhou-product:8090']
        
        # 4. Spring Boot 应用 - xiaozhou-stock
        - job_name: 'xiaozhou-stock'
          scrape_interval: 30s
          metrics_path: '/actuator/prometheus'
          static_configs:
            - targets: ['xiaozhou-stock:8091']
        
        # 5. cAdvisor 容器指标
        - job_name: 'cadvisor'
          scrape_interval: 30s
          static_configs:
            - targets: ['cadvisor:8080']


# Processors
processors:
  batch:
    timeout: 10s
    send_batch_size: 1024
  
  resourcedetection:
    detectors: [env, system]
    timeout: 5s

  resource:
    attributes:
      - key: deployment.environment
        value: "production"
        action: insert

  # Transform logs to add trace context
  transform:
    trace_statements:
        - context: resource
          statements:
            - set(resource.attributes["service.name"], "unknown") where resource.attributes["service.name"] == nil

  # OTLP processor to ensure proper OTLP format for traces
  transform/traces:
    error_mode: ignore
    trace_statements:
      - context: resource
        statements:
          - keep_keys(resource.attributes, ["service.name", "service.namespace", "service.instance.id", "service.version", "deployment.environment"])
          - set(resource.attributes["telemetry.sdk.name"], "opentelemetry")
          - set(resource.attributes["telemetry.sdk.language"], "java")

  # Transform processor for logs
  transform/logs:
    error_mode: ignore
    log_statements:
      - context: resource
        statements:
          - keep_keys(resource.attributes, ["service.name", "service.namespace", "service.instance.id", "service.version", "deployment.environment"])
          - set(resource.attributes["telemetry.sdk.name"], "opentelemetry")
          - set(resource.attributes["telemetry.sdk.language"], "java")

  # Transform processor for metrics
  transform/metrics:
    error_mode: ignore
    metric_statements:
      - context: resource
        statements:
          - set(resource.attributes["telemetry.sdk.name"], "opentelemetry")

# Exporters
exporters:
  # OTLP exporter to Data Prepper (for metrics)
  otlp/dataprepper-metrics:
    endpoint: data-prepper:21891
    tls:
      insecure: true
    # 配置重试和超时
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
    timeout: 30s
  
  # OTLP gRPC exporter to Data Prepper (for traces)
  otlp/dataprepper-traces:
    endpoint: data-prepper:21890
    tls:
      insecure: true

  # OTLP exporter to Data Prepper (for logs) - port 21892
  otlp/dataprepper-logs:
    endpoint: data-prepper:21892
    tls:
      insecure: true

# Service pipelines
service:
  pipelines:
    # Metrics pipeline - 接收 Prometheus 抓取的指标，导出到 Data Prepper
    metrics:
      receivers: [prometheus]
      processors: [resourcedetection, resource, transform/metrics, batch]
      exporters: [otlp/dataprepper-metrics]
    
    # Traces pipeline - receives OTLP traces from external clients
    traces:
      receivers: [otlp]
      processors: [resource, transform/traces, batch]
      exporters: [otlp/dataprepper-traces]

    # Logs pipeline - receives OTLP logs from Java applications via Java agent
    logs:
      receivers: [otlp]
      processors: [resource, transform/logs, batch]
      exporters: [otlp/dataprepper-logs]
  
  telemetry:
    logs:
      level: info