# 服务配置
spring:
  application:
    name: xiaozhou-product
  cloud:
    nacos:
      discovery:
        #nacos 服务地址（Docker 网络中使用容器名）
        server-addr: nacos:8848
        #nacos 认证信息
        username: nacos
        password: nacos
        # 心跳配置（增强服务注册稳定性）
        heart-beat-interval: 5000
        heart-beat-timeout: 15000
        ip-delete-timeout: 30000
        # 注册配置
        register-enabled: true
        watch-delay: 3000
  datasource:
      url: jdbc:mysql:///mytestshop?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=GMT%2b8&allowMultiQueries=true
      username: root
      password: root
      driver-class-name: com.mysql.cj.jdbc.Driver

# Feign timeout configuration
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
      xiaozhou-order:
        connectTimeout: 5000
        readTimeout: 5000

# Ribbon load balancer configuration for Nacos
ribbon:
  # Connect timeout for Ribbon
  ConnectTimeout: 3000
  # Read timeout for Ribbon
  ReadTimeout: 5000
  # Whether to retry on connection failure
  OkToRetryOnAllOperations: false
  # Max retries for current instance
  MaxAutoRetries: 0
  # Max retries for next instance
  MaxAutoRetriesNextServer: 1
  # Interval to refresh server list from Nacos
  ServerListRefreshInterval: 3000

#????
server:
  port: 8090

management:
  endpoints:
    web:
      exposure:
        include: 'prometheus'
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}