networks:
  skywalking-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  opensearch-data:
  app-logs:
  nacos-logs:
  nacos-data:
  neo4j-data:
  neo4j-logs:
  zookeeper-data:
  kafka-data: