receivers:
  # 接收 SkyWalking Agent 数据
  skywalking:
    protocols:
      grpc:
        endpoint: 0.0.0.0:11800
      http:
        endpoint: 0.0.0.0:12800
  # OTLP receiver for traces (external clients)
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318


  # Prometheus receiver (scrape metrics)
  prometheus:
    config:
      scrape_configs:
        - job_name: 'otel-collector'
          scrape_interval: 30s
          static_configs:
            - targets: ['localhost:8888']
        
        - job_name: 'xiaozhou-order'
          scrape_interval: 30s
          static_configs:
            - targets: ['xiaozhou-order:8089']
          metrics_path: '/actuator/prometheus'
        
        - job_name: 'xiaozhou-product'
          scrape_interval: 30s
          static_configs:
            - targets: ['xiaozhou-product:8090']
          metrics_path: '/actuator/prometheus'
        
        - job_name: 'cadvisor'
          scrape_interval: 30s
          static_configs:
            - targets: ['cadvisor:8080']

  # File log receiver - collect logs from application log files
  filelog:
    include:
      - /var/log/apps/*.log
    start_at: end
    include_file_name: true
    include_file_path: true
    operators:
      - type: move
        from: attributes["log.file.path"]
        to: resource["log.file.path"]
      - type: move
        from: attributes["log.file.name"]
        to: resource["log.file.name"]

# Processors
processors:
  batch:
    timeout: 10s
    send_batch_size: 1024
  
  resourcedetection:
    detectors: [env, system]
    timeout: 5s

  resource:
    attributes:
      - key: deployment.environment
        value: "production"
        action: insert

  # Transform logs to add service name
  transform:
    log_statements:
        - context: resource
          statements:
            - set(resource.attributes["service.name"], "unknown") where resource.attributes["service.name"] == nil
# Exporters
exporters:
  # OTLP exporter to Data Prepper (for metrics)
  otlp/dataprepper-metrics:
    endpoint: data-prepper:21891
    tls:
      insecure: true
  
  # OTLP exporter to Data Prepper (for traces from OAP)
  otlp/dataprepper-traces:
    endpoint: data-prepper:21890
    tls:
      insecure: true

  # OTLP exporter to Data Prepper (for logs)
  otlp/data-prepper-logs:
    endpoint: data-prepper:21892
    tls:
      insecure: true

# Service pipelines
service:
  pipelines:
    # Metrics pipeline
    metrics:
      receivers: [prometheus]
      processors: [batch, resource]
      exporters: [otlp/dataprepper-metrics]
    
    # Traces pipeline - receives OTLP traces from external clients
    traces:
      receivers: [otlp,skywalking]
      processors: [batch, resource]
      exporters: [otlp/dataprepper-traces]

    # Logs pipeline - collect application logs
    logs:
      receivers: [filelog]
      processors: [batch, resource, transform]
      exporters: [otlp/data-prepper-logs]
  
  telemetry:
    logs:
      level: info